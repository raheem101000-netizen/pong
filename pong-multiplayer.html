<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pong — Multiplayer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#05050f;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Space Grotesk',system-ui;color:#fff;gap:10px;padding:10px;}
#hud{display:flex;align-items:center;justify-content:space-between;width:400px;max-width:100vw;padding:6px 4px;font-size:13px;}
#hud .score{font-size:22px;font-weight:700;font-family:monospace;}
#hud .label{color:rgba(255,255,255,0.4);font-size:11px;}
#wrap{position:relative;}
canvas{background:#0a0a14;border-radius:8px;border:1px solid rgba(255,255,255,0.08);touch-action:none;display:block;max-width:100vw;height:auto;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,15,0.96);border-radius:8px;z-index:5;gap:14px;padding:20px;text-align:center;}
.screen.hidden{display:none;}
.screen h2{font-size:20px;}
.screen p{color:rgba(255,255,255,0.5);font-size:13px;}
.code-box{font-size:44px;font-weight:700;font-family:monospace;color:#4CFF6C;letter-spacing:8px;}
input{background:#0a1628;border:1px solid rgba(74,184,255,0.3);border-radius:6px;padding:10px 14px;color:#fff;font-size:15px;text-align:center;width:200px;}
button{background:#4CFF6C;color:#04210d;border:none;border-radius:6px;padding:11px 22px;font-size:14px;font-weight:600;cursor:pointer;}
button.alt{background:rgba(255,255,255,0.08);color:#fff;}
.big{font-size:48px;font-weight:700;}
#countdown{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:90px;font-weight:700;color:#4CFF6C;z-index:6;pointer-events:none;}
#countdown.hidden{display:none;}
</style>
</head>
<body>
<div id="hud">
  <div><span class="label">You</span> <span class="score" id="myScore">0</span></div>
  <div class="label" id="statusText">—</div>
  <div><span class="score" id="oppScore">0</span> <span class="label">Opp</span></div>
</div>
<div id="wrap">
  <canvas id="c" width="400" height="660"></canvas>
  <div id="countdown" class="hidden">3</div>

  <!-- Menu screen -->
  <div class="screen" id="menu">
    <h2>Pong Multiplayer</h2>
    <p>Create or join a room from the lobby</p>
    <button id="lobbyBtn">Go to Lobby</button>
    <p style="margin-top:8px;">or join directly with a code:</p>
    <input id="nameInput" placeholder="Your name" maxlength="12">
    <input id="codeInput" placeholder="4-digit code" maxlength="4">
    <button id="joinBtn" class="alt">Join Room</button>
  </div>

  <!-- Waiting screen -->
  <div class="screen hidden" id="waiting">
    <p>Room code — share with your opponent</p>
    <div class="code-box" id="roomCode">----</div>
    <p id="waitMsg">Waiting for opponent…</p>
    <button id="cancelBtn" class="alt">Cancel</button>
  </div>

  <!-- Result screen -->
  <div class="screen hidden" id="result">
    <h2 id="resultTitle">—</h2>
    <div class="big" id="resultScore">—</div>
    <button id="againBtn">Back to Menu</button>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
// ════════════════════════════════════════════════════════════════════════════
// PURE RENDERER — single socket, single page. Draws server state EXACTLY.
// No client prediction. No interpolation. Server is the only authority.
// (Same principle as Curvytron.)
// ════════════════════════════════════════════════════════════════════════════
const SERVER_W = 400, SERVER_H = 660; // server's coordinate space
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height; // 400×660 — matches server exactly, scale = 1

// Server-tuned constants (must match server.js)
const BALL_R = Math.round(Math.min(SERVER_W,SERVER_H)*0.018);
const PADDLE_LONG = Math.round(SERVER_W*0.28);
const PADDLE_SHORT = Math.round(SERVER_H*0.018);

let socket = null;
let myRole = null;        // 'p1' or 'p2'
let myName = 'Player';
// Persistent ID that survives socket reconnects — used to re-bind to our player slot.
let myClientId = sessionStorage.getItem('pongClientId');
if(!myClientId){
  myClientId = 'c' + Date.now() + Math.random().toString(36).slice(2,8);
  sessionStorage.setItem('pongClientId', myClientId);
}
let roomCode = null;
let gameState = null;     // latest server state — the ONLY source of truth
let phase = 'menu';       // menu | waiting | countdown | playing | result

// ── Screens ──
function show(screen){
  ['menu','waiting','result'].forEach(s=>{
    document.getElementById(s).classList.toggle('hidden', s!==screen);
  });
}

// ── Connect ONCE, stay connected the whole session ──
function connect(){
  if(socket) return;
  socket = io();

  // On EVERY connect — including auto-reconnects after a dropped WebSocket —
  // re-join the room so the server re-binds our (new) socket ID to our player slot.
  // Without this, a reconnect gets a new socket ID that isn't in gameJoined,
  // and all our paddle input is silently dropped → paddle frozen at the wall.
  socket.on('connect', () => {
    if(roomCode){
      socket.emit('joinRoom', { code: roomCode, name: myName, clientId: myClientId });
    }
  });

  socket.on('roomJoined', ({code, role}) => {
    roomCode = code;
    myRole = role;
    document.getElementById('roomCode').textContent = code;
    if(phase === 'menu' || phase === 'waiting'){
      phase = 'waiting';
      show('waiting');
    }
  });

  socket.on('waitingForOpponent', () => {
    document.getElementById('waitMsg').textContent = 'Waiting for opponent…';
  });

  socket.on('opponentName', ({name}) => {
    document.getElementById('waitMsg').textContent = 'Opponent: ' + name;
  });

  socket.on('countdown', ({count}) => {
    phase = 'countdown';
    show(null);
    const cd = document.getElementById('countdown');
    cd.classList.remove('hidden');
    cd.textContent = count;
  });

  // THE single source of truth — draw exactly this, every tick
  socket.on('state', (s) => {
    gameState = s;
    if(phase !== 'playing'){
      phase = 'playing';
      document.getElementById('countdown').classList.add('hidden');
      show(null);
    }
    // Update scores
    const myScore  = myRole==='p1' ? s.p1.score : s.p2.score;
    const oppScore = myRole==='p1' ? s.p2.score : s.p1.score;
    document.getElementById('myScore').textContent = myScore ?? 0;
    document.getElementById('oppScore').textContent = oppScore ?? 0;
    document.getElementById('statusText').textContent = s.delay > 0 ? 'Get ready' : 'Playing';
  });

  socket.on('matchEnd', (data) => {
    phase = 'result';
    const iWon = (myRole==='p1' && data.winner==='p1') || (myRole==='p2' && data.winner==='p2');
    document.getElementById('resultTitle').textContent = iWon ? 'You Win!' : 'You Lose';
    document.getElementById('resultTitle').style.color = iWon ? '#4CFF6C' : '#FF4444';
    const myScore  = myRole==='p1' ? data.p1Score : data.p2Score;
    const oppScore = myRole==='p1' ? data.p2Score : data.p1Score;
    document.getElementById('resultScore').textContent = (myScore ?? 0) + ' — ' + (oppScore ?? 0);
    show('result');
  });

  socket.on('seriesEnd', () => {});

  socket.on('opponentLeft', () => {
    if(phase === 'playing' || phase === 'countdown'){
      document.getElementById('resultTitle').textContent = 'Opponent Left';
      document.getElementById('resultTitle').style.color = '#FFD700';
      document.getElementById('resultScore').textContent = '—';
      phase = 'result';
      show('result');
    }
  });

  socket.on('error', ({msg}) => {
    alert(msg || 'Error');
    phase = 'menu'; show('menu');
  });
}

// ── Input: EXACTLY like solo. Track held keys, send current direction every
// frame (60×/sec). No "send on change" events that can be lost. Because the
// true direction is broadcast continuously, the paddle can never stay stuck —
// the moment you release, the very next frame tells the server dir=0.
const heldKeys = {}; // e.code -> true/false, same idea as solo's state.keys

document.addEventListener('keydown', e => {
  heldKeys[e.code] = true;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
  sendNow();
});
document.addEventListener('keyup', e => { heldKeys[e.code] = false; sendNow(); });
window.addEventListener('blur', () => { for(const k in heldKeys) heldKeys[k] = false; sendNow(); });

// Touch: held while finger is down on a side, released on lift
let touchDir = 0;
function setTouch(clientX){
  const rect = canvas.getBoundingClientRect();
  touchDir = clientX < rect.left + rect.width/2 ? -1 : 1;
}
canvas.addEventListener('touchstart', e => { if(e.touches[0]) setTouch(e.touches[0].clientX); sendNow(); e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchmove',  e => { if(e.touches[0]) setTouch(e.touches[0].clientX); sendNow(); e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchend',   e => { touchDir = 0; sendNow(); e.preventDefault(); }, {passive:false});

function currentDir(){
  const left  = heldKeys['ArrowLeft']  || heldKeys['KeyA'];
  const right = heldKeys['ArrowRight'] || heldKeys['KeyD'];
  let d = (left === right) ? 0 : (left ? -1 : 1);
  if(d === 0 && touchDir !== 0) d = touchDir;
  return d;
}

function sendNow(){
  if(socket && socket.connected && roomCode){
    socket.emit('paddleDir', { dir: currentDir() });
  }
}
function pumpInput(){
  if(socket && socket.connected && roomCode){
    socket.emit('paddleDir', { dir: currentDir() });
  }
}
setInterval(pumpInput, 1000/30);

// ── RENDER LOOP — draws server state exactly. World = canvas (scale 1). ──
function draw(){
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0,0,W,H);

  // center line
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1; ctx.setLineDash([6,8]);
  ctx.beginPath(); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2); ctx.stroke();
  ctx.setLineDash([]);

  if(gameState && phase === 'playing'){
    const s = gameState;
    // My paddle is always drawn at the bottom, opponent at top — flip view if p2
    // BUT positions come straight from server. To keep "you at bottom":
    let myPaddle, oppPaddle, ball;
    if(myRole === 'p1'){
      myPaddle = s.p1; oppPaddle = s.p2; ball = s.ball;
    } else {
      // p2 sees the board flipped so they're at the bottom too
      myPaddle = { x: s.p2.x, y: SERVER_H - s.p2.y - PADDLE_SHORT };
      oppPaddle = { x: s.p1.x, y: SERVER_H - s.p1.y - PADDLE_SHORT };
      ball = { x: s.ball.x, y: SERVER_H - s.ball.y };
    }

    // Ball — exact server position
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();

    // My paddle (bottom, green)
    ctx.fillStyle = '#4CFF6C';
    ctx.fillRect(myPaddle.x, myPaddle.y, PADDLE_LONG, PADDLE_SHORT);

    // Opponent paddle (top, blue)
    ctx.fillStyle = '#4BA8FF';
    ctx.fillRect(oppPaddle.x, oppPaddle.y, PADDLE_LONG, PADDLE_SHORT);
  }

  requestAnimationFrame(draw);
}

// ── Menu buttons ──
document.getElementById('lobbyBtn').onclick = () => {
  location.href = '/rooms';
};
document.getElementById('joinBtn').onclick = () => {
  const code = document.getElementById('codeInput').value.trim();
  if(code.length !== 4){ alert('Enter a 4-digit code'); return; }
  myName = document.getElementById('nameInput').value.trim() || 'Player';
  connect();
  const go = () => socket.emit('joinRoom', { code, name: myName, clientId: myClientId });
  if(socket.connected) go(); else socket.once('connect', go);
};
document.getElementById('cancelBtn').onclick = () => {
  if(socket){ socket.disconnect(); socket = null; }
  phase = 'menu'; show('menu');
};
document.getElementById('againBtn').onclick = () => {
  if(socket){ socket.disconnect(); socket = null; }
  myRole = null; roomCode = null; gameState = null;
  phase = 'menu'; show('menu');
};

// ── Auto-join from lobby URL (?room=CODE&name=NAME) — SAME socket, no reconnect ──
const params = new URLSearchParams(location.search);
const urlRoom = params.get('room');
const urlName = params.get('name');
if(urlRoom){
  myName = urlName || 'Player';
  show(null);
  connect();
  const go = () => socket.emit('joinRoom', { code: urlRoom, name: myName, clientId: myClientId });
  if(socket.connected) go(); else socket.once('connect', go);
}

// Handle createRoom response (server emits roomJoined with the new code)
// Already handled by roomJoined listener above.

show('menu');
requestAnimationFrame(draw);
</script>
</body>
</html>
