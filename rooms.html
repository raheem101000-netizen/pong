<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PONG — Multiplayer Lobby</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; background: #000; font-family: -apple-system, 'Segoe UI', sans-serif; color: #fff; overflow-x: hidden; }
#app { display: flex; flex-direction: column; min-height: 100vh; }
#header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #111; }
#header h1 { font-size: 22px; letter-spacing: 6px; font-weight: 300; }
#header-right { font-size: 11px; color: #333; letter-spacing: 1px; }
#main { flex: 1; display: flex; gap: 0; }
#rooms-panel { width: 340px; border-right: 1px solid #111; display: flex; flex-direction: column; }
#room-panel  { flex: 1; display: flex; flex-direction: column; }
#rooms-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid #111; }
#rooms-header span { font-size: 11px; color: #444; letter-spacing: 2px; }
#rooms-list { flex: 1; overflow-y: auto; }
.room-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid #0a0a0a; cursor: pointer; transition: background 0.1s; }
.room-item:hover { background: #0d0d0d; }
.room-item.active { background: #111; border-left: 2px solid #4CFF6C; }
.room-name { font-size: 13px; color: #ccc; }
.room-count { font-size: 11px; color: #333; }
#rooms-empty { padding: 40px 16px; text-align: center; font-size: 12px; color: #222; letter-spacing: 1px; }
#create-section { padding: 14px 16px; border-top: 1px solid #111; }
#room-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 12px; }
#room-empty p { font-size: 12px; color: #222; letter-spacing: 1px; }
#room-detail { display: none; flex-direction: column; flex: 1; }
#room-detail-header { padding: 14px 20px; border-bottom: 1px solid #111; display: flex; align-items: center; justify-content: space-between; }
#room-detail-header h2 { font-size: 15px; font-weight: 400; letter-spacing: 2px; }
#room-code-badge { font-size: 22px; font-weight: 700; font-family: monospace; color: #4CFF6C; letter-spacing: 6px; }
#players-section { padding: 16px 20px; border-bottom: 1px solid #111; }
#players-section h3 { font-size: 10px; color: #333; letter-spacing: 2px; margin-bottom: 12px; }
#players-list { display: flex; flex-direction: column; gap: 8px; }
.player-row { display: flex; align-items: center; gap: 10px; }
.player-dot { width: 10px; height: 10px; border-radius: 50%; background: #4CFF6C; flex-shrink: 0; }
.player-dot.p2 { background: #4488FF; }
.player-name { font-size: 13px; color: #ccc; flex: 1; }
.player-badge { font-size: 10px; padding: 2px 8px; border-radius: 2px; letter-spacing: 1px; }
.badge-host   { background: #1a3a1a; color: #4CFF6C; }
.badge-ready  { background: #1a2a3a; color: #4488FF; }
.badge-waiting { background: #1a1a1a; color: #444; }
.player-slot { color: #222; font-size: 12px; font-style: italic; }
#chat-section { flex: 1; display: flex; flex-direction: column; padding: 0; min-height: 0; }
#chat-messages { flex: 1; overflow-y: auto; padding: 12px 20px; display: flex; flex-direction: column; gap: 6px; min-height: 80px; max-height: 180px; }
.chat-msg { font-size: 12px; color: #444; }
.chat-msg span { color: #666; }
#chat-input-row { display: flex; gap: 8px; padding: 10px 20px; border-top: 1px solid #0a0a0a; }
#chat-input { flex: 1; background: transparent; border: 1px solid #1a1a1a; color: #ccc; padding: 8px 12px; font-size: 12px; font-family: monospace; border-radius: 3px; outline: none; }
#chat-input:focus { border-color: #333; }
#actions-section { padding: 16px 20px; border-top: 1px solid #111; display: flex; gap: 10px; flex-wrap: wrap; }
.btn { background: transparent; border: 1px solid #333; color: #666; padding: 9px 18px; font-family: monospace; font-size: 12px; cursor: pointer; letter-spacing: 1px; border-radius: 3px; transition: all 0.15s; }
.btn:hover { border-color: #fff; color: #fff; }
.btn:active { transform: scale(0.97); }
.btn-green { background: #4CFF6C; color: #111; border: none; font-weight: 600; }
.btn-green:hover { background: #2ecc71; color: #111; border: none; }
.btn-green:disabled { background: #1a3a1a; color: #2a6a2a; cursor: not-allowed; }
.btn-blue { background: #4488FF; color: #fff; border: none; font-weight: 600; }
.btn-blue:hover { background: #2266dd; border: none; }
.btn-red { background: #FF4444; color: #fff; border: none; font-weight: 600; }
.btn-sm { padding: 6px 12px; font-size: 11px; }
#name-bar { display: flex; align-items: center; gap: 10px; padding: 10px 20px; background: #050505; border-bottom: 1px solid #111; }
#name-bar label { font-size: 11px; color: #333; letter-spacing: 1px; white-space: nowrap; }
#name-input { background: transparent; border: 1px solid #1a1a1a; color: #ccc; padding: 7px 12px; font-size: 13px; font-family: monospace; border-radius: 3px; outline: none; width: 160px; }
#name-input:focus { border-color: #444; }
#modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; }
#modal-overlay.open { display: flex; }
#modal { background: #080808; border: 1px solid #1a1a1a; border-radius: 6px; padding: 24px; width: 300px; display: flex; flex-direction: column; gap: 14px; }
#modal h3 { font-size: 13px; letter-spacing: 3px; font-weight: 400; color: #ccc; }
.modal-field { display: flex; flex-direction: column; gap: 6px; }
.modal-field label { font-size: 10px; color: #444; letter-spacing: 1px; }
.modal-field input { background: transparent; border: 1px solid #222; color: #ccc; padding: 9px 12px; font-size: 13px; font-family: monospace; border-radius: 3px; outline: none; }
.modal-field input:focus { border-color: #444; }
.modal-row { display: flex; gap: 8px; justify-content: flex-end; }
#status-bar { padding: 8px 20px; font-size: 11px; color: #333; letter-spacing: 1px; border-top: 1px solid #0a0a0a; }
#status-bar.error { color: #FF4444; }
#status-bar.ok { color: #4CFF6C; }
@media (max-width: 600px) {
  #main { flex-direction: column; }
  #rooms-panel { width: 100%; border-right: none; border-bottom: 1px solid #111; max-height: 280px; }
  #room-detail-header { flex-direction: column; align-items: flex-start; gap: 6px; }
}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>PONG</h1>
    <div id="header-right">MULTIPLAYER LOBBY</div>
  </div>
  <div id="name-bar">
    <label>YOUR NAME</label>
    <input id="name-input" type="text" maxlength="12" placeholder="Enter name..." autocomplete="off" />
    <button class="btn btn-sm" id="btn-set-name">Set</button>
  </div>
  <div id="main">
    <div id="rooms-panel">
      <div id="rooms-header">
        <span>ROOMS</span>
        <button class="btn btn-sm btn-green" id="btn-open-create">+ Create</button>
      </div>
      <div id="rooms-list">
        <div id="rooms-empty">No rooms yet.<br>Create one to start.</div>
      </div>
      <div id="create-section">
        <div style="display:flex;gap:8px;">
          <input id="join-code-input" type="text" maxlength="4" placeholder="Room code..." style="background:transparent;border:1px solid #1a1a1a;color:#ccc;padding:8px 12px;font-size:14px;font-family:monospace;border-radius:3px;outline:none;width:110px;letter-spacing:4px;text-align:center;" />
          <button class="btn btn-sm" id="btn-join-code">Join →</button>
        </div>
      </div>
    </div>
    <div id="room-panel">
      <div id="room-empty">
        <p>SELECT OR CREATE A ROOM</p>
        <p style="font-size:10px;">First to 3 points wins · $4.99 entry</p>
      </div>
      <div id="room-detail">
        <div id="room-detail-header">
          <h2 id="room-detail-name">Room Name</h2>
          <div>
            <div style="font-size:10px;color:#333;letter-spacing:1px;text-align:right;margin-bottom:2px;">ROOM CODE</div>
            <div id="room-code-badge">----</div>
          </div>
        </div>
        <div id="players-section">
          <h3>PLAYERS</h3>
          <div id="players-list"></div>
        </div>
        <div id="chat-section">
          <div id="chat-messages"></div>
          <div id="chat-input-row">
            <input id="chat-input" type="text" placeholder="Say something..." maxlength="80" autocomplete="off" />
            <button class="btn btn-sm" id="btn-chat-send">Send</button>
          </div>
        </div>
        <div id="actions-section">
          <button class="btn btn-green" id="btn-ready" style="display:none;">✓ Ready</button>
          <button class="btn btn-blue"  id="btn-start" style="display:none;">▶ Start Game</button>
          <button class="btn btn-red btn-sm" id="btn-leave">Leave</button>
        </div>
      </div>
    </div>
  </div>
  <div id="status-bar">Connecting...</div>
</div>
<div id="modal-overlay">
  <div id="modal">
    <h3>CREATE ROOM</h3>
    <div class="modal-field">
      <label>ROOM NAME</label>
      <input id="modal-room-name" type="text" maxlength="20" placeholder="My Room" />
    </div>
    <div class="modal-row">
      <button class="btn" id="btn-modal-cancel">Cancel</button>
      <button class="btn btn-green" id="btn-modal-create">Create</button>
    </div>
  </div>
</div>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io({ transports: ['websocket'] });

let myName = localStorage.getItem('pong_name') || '';
let myRoom = null;
let isMaster = false;
let isReady = false;

if (myName) document.getElementById('name-input').value = myName;

function setStatus(msg, type) {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className = type || '';
}

document.getElementById('btn-set-name').onclick = () => {
  const v = document.getElementById('name-input').value.trim();
  if (!v) return;
  myName = v;
  localStorage.setItem('pong_name', myName);
  setStatus('Name set: ' + myName, 'ok');
};
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-set-name').click();
});

socket.on('connect', () => setStatus('Connected · ' + socket.id.slice(0,8), 'ok'));
socket.on('disconnect', () => setStatus('Disconnected', 'error'));
socket.on('connect_error', () => setStatus('Cannot connect to server', 'error'));
socket.on('room:error', ({ message }) => setStatus(message, 'error'));

socket.on('room:created', ({ room, player }) => {
  myRoom = room;
  isMaster = true;
  isReady = false;
  showRoomDetail(room, player);
  setStatus('Room created — share code ' + room.code, 'ok');
});

socket.on('room:joined', ({ room, player }) => {
  myRoom = room;
  isMaster = false;
  isReady = false;
  showRoomDetail(room, player);
  setStatus('Joined room ' + room.code, 'ok');
});

socket.on('room:state', (room) => {
  myRoom = room;
  renderPlayers(room);
  updateActions();
});

socket.on('room:player:join', ({ player }) => {
  setStatus(player.name + ' joined', 'ok');
  addChatMsg('', player.name + ' joined the room');
});

socket.on('room:player:leave', ({ id }) => {
  addChatMsg('', 'A player left the room');
});

socket.on('room:player:ready', ({ player }) => {
  setStatus(player.name + ' is ready!', 'ok');
});

socket.on('room:master', ({ master }) => {
  if (master === socket.id) {
    isMaster = true;
    setStatus('You are now the host', 'ok');
    updateActions();
  }
});

socket.on('room:talk', ({ player, content }) => {
  addChatMsg(player, content);
});

socket.on('room:game:start', ({ code, players }) => {
  setStatus('Game starting!', 'ok');
  setTimeout(() => {
    window.location.href = '/pong-multiplayer.html?room=' + code + '&name=' + encodeURIComponent(myName);
  }, 500);
});

function showRoomDetail(room, myPlayer) {
  document.getElementById('room-empty').style.display  = 'none';
  document.getElementById('room-detail').style.display = 'flex';
  document.getElementById('room-detail-name').textContent = room.name;
  document.getElementById('room-code-badge').textContent  = room.code;
  renderPlayers(room);
  updateActions();
}

function renderPlayers(room) {
  const list = document.getElementById('players-list');
  list.innerHTML = '';
  const players = room.players || [];
  players.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'player-row';
    const dot = document.createElement('div');
    dot.className = 'player-dot' + (i === 1 ? ' p2' : '');
    const name = document.createElement('div');
    name.className = 'player-name';
    name.textContent = p.name + (p.id === socket.id ? ' (you)' : '');
    const badge = document.createElement('div');
    badge.className = 'player-badge';
    if (p.master) { badge.textContent = 'HOST'; badge.classList.add('badge-host'); }
    else if (p.ready) { badge.textContent = 'READY'; badge.classList.add('badge-ready'); }
    else { badge.textContent = 'WAITING'; badge.classList.add('badge-waiting'); }
    row.appendChild(dot); row.appendChild(name); row.appendChild(badge);
    list.appendChild(row);
  });
  if (players.length < 2) {
    const row = document.createElement('div');
    row.className = 'player-row';
    row.innerHTML = '<div class="player-slot">Waiting for opponent...</div>';
    list.appendChild(row);
  }
}

function updateActions() {
  const btnReady = document.getElementById('btn-ready');
  const btnStart = document.getElementById('btn-start');
  if (!myRoom) return;
  btnReady.style.display = (!isReady && !isMaster) ? 'block' : 'none';
  btnStart.style.display = isMaster ? 'block' : 'none';
  const allReady = myRoom.players?.length === 2 && myRoom.players.every(p => p.ready || p.master);
  btnStart.disabled = !allReady;
  if (isReady) {
    btnReady.textContent = '✓ Ready';
    btnReady.style.background = '#1a3a1a';
    btnReady.style.color = '#4CFF6C';
  }
}

function addChatMsg(player, content) {
  const box = document.getElementById('chat-messages');
  const msg = document.createElement('div');
  msg.className = 'chat-msg';
  msg.innerHTML = player ? `<span>${player}:</span> ${content}` : `<span>·</span> ${content}`;
  box.appendChild(msg);
  box.scrollTop = box.scrollHeight;
}

document.getElementById('btn-chat-send').onclick = sendChat;
document.getElementById('chat-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });
function sendChat() {
  const input = document.getElementById('chat-input');
  const content = input.value.trim();
  if (!content || !myRoom) return;
  socket.emit('room:talk', { content });
  input.value = '';
}

document.getElementById('btn-ready').onclick = () => {
  if (!myName) { setStatus('Set your name first', 'error'); return; }
  isReady = true;
  socket.emit('room:ready');
  updateActions();
};

document.getElementById('btn-start').onclick = () => {
  if (!myRoom) return;
  const allReady = myRoom.players?.length === 2 && myRoom.players.every(p => p.ready || p.master);
  if (!allReady) { setStatus('Waiting for opponent to ready up', 'error'); return; }
  socket.emit('room:ready');
};

document.getElementById('btn-leave').onclick = () => {
  socket.emit('room:leave');
  myRoom = null; isMaster = false; isReady = false;
  document.getElementById('room-empty').style.display  = 'flex';
  document.getElementById('room-detail').style.display = 'none';
  setStatus('Left room', '');
};

document.getElementById('btn-open-create').onclick = () => {
  if (!myName) { setStatus('Set your name first', 'error'); return; }
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-room-name').value = myName + "'s Room";
  document.getElementById('modal-room-name').focus();
};

document.getElementById('btn-modal-cancel').onclick = () => {
  document.getElementById('modal-overlay').classList.remove('open');
};

document.getElementById('btn-modal-create').onclick = () => {
  const name = document.getElementById('modal-room-name').value.trim() || myName + "'s Room";
  socket.emit('room:create', { name, playerName: myName });
  document.getElementById('modal-overlay').classList.remove('open');
};

document.getElementById('modal-room-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-modal-create').click();
});

document.getElementById('btn-join-code').onclick = joinByCode;
document.getElementById('join-code-input').addEventListener('keydown', e => { if (e.key === 'Enter') joinByCode(); });
function joinByCode() {
  if (!myName) { setStatus('Set your name first', 'error'); return; }
  const code = document.getElementById('join-code-input').value.trim();
  if (code.length !== 4) { setStatus('Enter a 4-digit code', 'error'); return; }
  socket.emit('room:join', { code, playerName: myName });
}

const params = new URLSearchParams(window.location.search);
if (params.get('name')) {
  myName = params.get('name');
  document.getElementById('name-input').value = myName;
  localStorage.setItem('pong_name', myName);
}
</script>
</body>
</html>
