<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PONG — Rooms</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100%;background:#0a0a0a;color:#fff;font-family:'Space Grotesk',sans-serif;}
#nav{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid #151515;background:#050505;}
#nav-logo{font-size:18px;letter-spacing:8px;font-weight:300;color:#fff;}
#nav-right{font-size:12px;color:#333;letter-spacing:1px;}
#name-bar{display:flex;align-items:center;gap:10px;padding:10px 28px;background:#080808;border-bottom:1px solid #111;}
#name-bar label{font-size:11px;color:#444;letter-spacing:1px;}
#name-input{background:transparent;border:1px solid #1a1a1a;color:#ccc;padding:7px 14px;font-size:13px;font-family:'Space Grotesk',sans-serif;border-radius:4px;outline:none;width:180px;}
#name-input:focus{border-color:#b450ff;}
.btn-purple{background:#b450ff;color:#fff;border:none;padding:8px 18px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;border-radius:4px;cursor:pointer;}
.btn-purple:hover{background:#9a3de0;}
#layout{display:flex;min-height:calc(100vh - 96px);}
#left{width:420px;border-right:1px solid #111;display:flex;flex-direction:column;}
#list-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #111;}
#list-header h2{font-size:12px;letter-spacing:3px;font-weight:500;color:#555;}
#rooms-table{flex:1;overflow-y:auto;}
#rooms-table table{width:100%;border-collapse:collapse;}
#rooms-table thead th{font-size:10px;color:#333;letter-spacing:2px;padding:10px 20px;text-align:left;border-bottom:1px solid #0d0d0d;font-weight:500;}
#rooms-table tbody tr{border-bottom:1px solid #0d0d0d;cursor:pointer;transition:background 0.1s;}
#rooms-table tbody tr:hover{background:#0d0d0d;}
#rooms-table tbody tr.active{background:#110a1a;border-left:2px solid #b450ff;}
#rooms-table tbody td{padding:12px 20px;font-size:13px;color:#888;}
td.room-name-cell{color:#ccc;font-weight:500;}
td.room-players-cell span{color:#b450ff;}
td.room-status-cell{text-align:right;}
.badge{font-size:10px;padding:3px 10px;border-radius:3px;letter-spacing:1px;font-weight:600;}
.badge-full{background:#2a1010;color:#ff4444;}
.join-btn{background:transparent;border:1px solid #b450ff;color:#b450ff;padding:5px 14px;font-size:11px;border-radius:3px;cursor:pointer;font-family:'Space Grotesk',sans-serif;letter-spacing:1px;}
.join-btn:hover{background:#b450ff;color:#fff;}
#rooms-empty{padding:60px 20px;text-align:center;color:#222;font-size:13px;line-height:2;}
#join-code-bar{padding:14px 20px;border-top:1px solid #111;display:flex;gap:8px;}
#join-code-input{flex:1;background:transparent;border:1px solid #1a1a1a;color:#ccc;padding:8px 14px;font-size:16px;font-family:monospace;border-radius:4px;outline:none;letter-spacing:6px;text-align:center;}
#join-code-input:focus{border-color:#b450ff;}
.btn-outline{background:transparent;border:1px solid #333;color:#666;padding:8px 16px;font-family:'Space Grotesk',sans-serif;font-size:12px;border-radius:4px;cursor:pointer;letter-spacing:1px;transition:all 0.15s;}
.btn-outline:hover{border-color:#fff;color:#fff;}
#right{flex:1;display:flex;flex-direction:column;}
#room-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:#1a1a1a;}
#room-placeholder p{font-size:13px;letter-spacing:1px;}
#room-detail{display:none;flex-direction:column;flex:1;}
#room-header{padding:16px 24px;border-bottom:1px solid #111;display:flex;align-items:center;justify-content:space-between;}
#room-header-left h2{font-size:17px;font-weight:500;letter-spacing:1px;}
#room-header-left p{font-size:11px;color:#444;letter-spacing:1px;margin-top:2px;}
#room-code-wrap{text-align:right;}
#room-code-label{font-size:10px;color:#333;letter-spacing:2px;margin-bottom:2px;}
#room-code-val{font-size:28px;font-weight:700;font-family:monospace;color:#b450ff;letter-spacing:8px;}
#players-wrap{padding:16px 24px;border-bottom:1px solid #111;}
#players-wrap h3{font-size:10px;color:#333;letter-spacing:3px;margin-bottom:12px;font-weight:500;}
#players-table{width:100%;border-collapse:collapse;}
#players-table th{font-size:10px;color:#2a2a2a;letter-spacing:2px;padding:6px 10px;text-align:left;font-weight:500;}
#players-table td{padding:10px 10px;font-size:13px;border-top:1px solid #0d0d0d;}
.p-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px;vertical-align:middle;}
.p-name{color:#ccc;}
.p-role{font-size:10px;padding:2px 8px;border-radius:3px;letter-spacing:1px;}
.role-host{background:#1a0f2a;color:#b450ff;}
.role-ready{background:#0f1a0f;color:#4CFF6C;}
.role-waiting{background:#111;color:#444;}
.p-slot{color:#1a1a1a;font-style:italic;font-size:12px;padding:10px 10px;}
#chat-wrap{flex:1;display:flex;flex-direction:column;min-height:0;}
#chat-msgs{flex:1;overflow-y:auto;padding:12px 24px;display:flex;flex-direction:column;gap:5px;max-height:200px;}
.chat-line{font-size:12px;color:#333;}
.chat-line .chat-author{color:#666;}
.chat-line .chat-sys{color:#222;font-style:italic;}
#chat-form{display:flex;gap:8px;padding:10px 24px;border-top:1px solid #0d0d0d;}
#chat-input{flex:1;background:transparent;border:1px solid #151515;color:#ccc;padding:8px 12px;font-size:12px;font-family:'Space Grotesk',sans-serif;border-radius:4px;outline:none;}
#chat-input:focus{border-color:#333;}
#actions{padding:16px 24px;border-top:1px solid #111;display:flex;gap:10px;align-items:center;}
.btn-green{background:#4CFF6C;color:#111;border:none;padding:10px 24px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;border-radius:4px;cursor:pointer;}
.btn-green:hover{background:#2ecc71;}
.btn-green:disabled{background:#1a2a1a;color:#2a4a2a;cursor:not-allowed;}
.btn-red{background:#ff4444;color:#fff;border:none;padding:10px 20px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;border-radius:4px;cursor:pointer;}
.btn-red:hover{background:#cc2222;}
#ready-status{font-size:11px;color:#444;letter-spacing:1px;margin-left:auto;}
#statusbar{padding:8px 28px;font-size:11px;color:#222;letter-spacing:1px;border-top:1px solid #080808;background:#050505;}
#statusbar.ok{color:#4CFF6C;}
#statusbar.err{color:#ff4444;}
#modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:200;}
#modal-bg.open{display:flex;}
#modal{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;padding:28px;width:320px;display:flex;flex-direction:column;gap:16px;}
#modal h3{font-size:13px;letter-spacing:3px;font-weight:500;color:#888;}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:10px;color:#444;letter-spacing:1px;}
.field input{background:transparent;border:1px solid #222;color:#ccc;padding:10px 14px;font-size:14px;font-family:'Space Grotesk',sans-serif;border-radius:4px;outline:none;}
.field input:focus{border-color:#b450ff;}
.toggle-row{display:flex;gap:8px;}
.toggle-btn{flex:1;background:transparent;border:1px solid #222;color:#555;padding:9px;font-size:12px;font-family:'Space Grotesk',sans-serif;border-radius:4px;cursor:pointer;letter-spacing:1px;transition:all 0.15s;}
.toggle-btn.active{border-color:#b450ff;color:#b450ff;background:#0f0a1a;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
@media(max-width:700px){#layout{flex-direction:column;}#left{width:100%;border-right:none;border-bottom:1px solid #111;max-height:320px;}}
</style>
</head>
<body>
<div id="nav"><div id="nav-logo">PONG</div><div id="nav-right">MULTIPLAYER LOBBY</div></div>
<div id="name-bar">
  <label>YOUR NAME</label>
  <input id="name-input" type="text" maxlength="12" placeholder="Enter your name..." autocomplete="off"/>
  <button class="btn-purple" id="btn-setname">Set Name</button>
</div>
<div id="layout">
  <div id="left">
    <div id="list-header">
      <h2>OPEN ROOMS</h2>
      <button class="btn-purple" id="btn-create">+ Create Room</button>
    </div>
    <div id="rooms-table">
      <table>
        <thead><tr><th>ROOM</th><th>PLAYERS</th><th></th></tr></thead>
        <tbody id="rooms-tbody"></tbody>
      </table>
      <div id="rooms-empty">No open rooms yet.<br>Create one to invite a friend.</div>
    </div>
    <div id="join-code-bar">
      <input id="join-code-input" type="text" maxlength="4" placeholder="CODE" autocomplete="off"/>
      <button class="btn-outline" id="btn-joincode">Join by Code →</button>
    </div>
  </div>
  <div id="right">
    <div id="room-placeholder">
      <p>SELECT OR CREATE A ROOM</p>
      <p style="font-size:11px;color:#111;">First to 3 points · 1v1 · Private rooms</p>
    </div>
    <div id="room-detail">
      <div id="room-header">
        <div id="room-header-left">
          <h2 id="rh-name">Room</h2>
          <p id="rh-sub">Waiting for players</p>
        </div>
        <div id="room-code-wrap">
          <div id="room-code-label">ROOM CODE</div>
          <div id="room-code-val">----</div>
        </div>
      </div>
      <div id="players-wrap">
        <h3>PLAYERS</h3>
        <table id="players-table">
          <thead><tr><th>NAME</th><th>STATUS</th></tr></thead>
          <tbody id="players-tbody"></tbody>
        </table>
      </div>
      <div id="chat-wrap">
        <div id="chat-msgs"></div>
        <div id="chat-form">
          <input id="chat-input" type="text" placeholder="Type a message..." maxlength="80" autocomplete="off"/>
          <button class="btn-outline" id="btn-chat">Send</button>
        </div>
      </div>
      <div id="actions">
        <button class="btn-green" id="btn-ready" style="display:none;">✓ Ready</button>
        <button class="btn-green" id="btn-start" style="display:none;">▶ Start Game</button>
        <button class="btn-red" id="btn-leave">Leave Room</button>
        <span id="ready-status"></span>
      </div>
    </div>
  </div>
</div>
<div id="statusbar">Connecting...</div>
<div id="modal-bg">
  <div id="modal">
    <h3>CREATE ROOM</h3>
    <div class="field"><label>ROOM NAME</label><input id="modal-name" type="text" maxlength="24" placeholder="e.g. My Room"/></div>
    <div class="field">
      <label>VISIBILITY</label>
      <div class="toggle-row">
        <button class="toggle-btn active" id="toggle-public">Public</button>
        <button class="toggle-btn" id="toggle-private">Private</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-outline" id="btn-modal-cancel">Cancel</button>
      <button class="btn-purple" id="btn-modal-confirm">Create</button>
    </div>
  </div>
</div>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io({ transports: ['websocket'] });
const PLAYER_COLORS = ['#b450ff','#4488FF'];
let myName = localStorage.getItem('pong_name') || '';
let myRoom = null, isMaster = false, isReady = false, roomIsPublic = true;
if (myName) document.getElementById('name-input').value = myName;

function status(msg, type) { const el=document.getElementById('statusbar'); el.textContent=msg; el.className=type||''; }

document.getElementById('btn-setname').onclick = setName;
document.getElementById('name-input').addEventListener('keydown', e=>{ if(e.key==='Enter') setName(); });
function setName() { const v=document.getElementById('name-input').value.trim(); if(!v) return; myName=v; localStorage.setItem('pong_name',myName); status('Name set: '+myName,'ok'); }

socket.on('connect', ()=>{ status('Connected','ok'); socket.emit('room:list'); });
socket.on('disconnect', ()=>status('Disconnected','err'));
socket.on('connect_error', ()=>status('Cannot connect to server','err'));
socket.on('room:error', ({message})=>status(message,'err'));

socket.on('room:created', ({room,player})=>{ myRoom=room; isMaster=true; isReady=false; renderDetail(room); status('Room created — code: '+room.code,'ok'); });
socket.on('room:joined',  ({room,player})=>{ myRoom=room; isMaster=false; isReady=false; renderDetail(room); status('Joined room '+room.code,'ok'); });
socket.on('room:state',   room=>{ myRoom=room; renderPlayers(room); updateActions(); });
socket.on('room:player:join',  ({player})=>{ sysMsg(player.name+' joined the room'); status(player.name+' joined','ok'); });
socket.on('room:player:leave', ()=>{ sysMsg('A player left the room'); updateActions(); });
socket.on('room:player:ready', ({player})=>status(player.name+' is ready!','ok'));
socket.on('room:master', ({master})=>{ if(master===socket.id){ isMaster=true; updateActions(); status('You are now host','ok'); } });
socket.on('room:talk', ({player,content})=>addMsg(player,content));
socket.on('room:game:start', ({code})=>{ status('Game starting!','ok'); setTimeout(()=>{ window.location.href='/pong-multiplayer.html?room='+code+'&name='+encodeURIComponent(myName); },600); });

socket.on('room:list',   ({rooms})=>renderRoomList(rooms));
socket.on('room:open',   ()=>socket.emit('room:list'));
socket.on('room:close',  ()=>socket.emit('room:list'));
socket.on('room:update', ()=>socket.emit('room:list'));

function renderRoomList(rooms) {
  const tbody=document.getElementById('rooms-tbody');
  const empty=document.getElementById('rooms-empty');
  tbody.innerHTML='';
  const open=rooms.filter(r=>r.open);
  empty.style.display=open.length?'none':'block';
  open.forEach(r=>{
    const tr=document.createElement('tr');
    const full=r.players>=2;
    tr.innerHTML=`<td class="room-name-cell">${r.name}</td><td class="room-players-cell"><span>${r.players}</span>/2</td><td class="room-status-cell">${full?'<span class="badge badge-full">FULL</span>':`<button class="join-btn" onclick="joinRoom('${r.id}')">Join</button>`}</td>`;
    tbody.appendChild(tr);
  });
}

function joinRoom(id) {
  if(!myName){ status('Set your name first','err'); return; }
  socket.emit('room:join',{room:id, player:{name:myName, color:PLAYER_COLORS[1]}});
}

function renderDetail(room) {
  document.getElementById('room-placeholder').style.display='none';
  document.getElementById('room-detail').style.display='flex';
  document.getElementById('rh-name').textContent=room.name;
  document.getElementById('room-code-val').textContent=room.code;
  renderPlayers(room); updateActions();
}

function renderPlayers(room) {
  const tbody=document.getElementById('players-tbody');
  tbody.innerHTML='';
  const players=room.players||[];
  players.forEach((p,i)=>{
    const tr=document.createElement('tr');
    const isMe=p.id===socket.id;
    const badge=p.master?'<span class="p-role role-host">HOST</span>':p.ready?'<span class="p-role role-ready">READY</span>':'<span class="p-role role-waiting">WAITING</span>';
    tr.innerHTML=`<td><span class="p-dot" style="background:${PLAYER_COLORS[i]||'#fff'}"></span><span class="p-name">${p.name}${isMe?' <span style="color:#444;font-size:11px;">(you)</span>':''}</span></td><td>${badge}</td>`;
    tbody.appendChild(tr);
  });
  if(players.length<2){ const tr=document.createElement('tr'); tr.innerHTML='<td class="p-slot" colspan="2">Waiting for opponent...</td>'; tbody.appendChild(tr); }
  document.getElementById('rh-sub').textContent=players.length<2?'Waiting for opponent':'Both players connected';
  const readyCount=players.filter(p=>p.ready).length;
  document.getElementById('ready-status').textContent=readyCount+'/2 ready';
}

function updateActions() {
  const btnReady=document.getElementById('btn-ready');
  const btnStart=document.getElementById('btn-start');
  if(!myRoom) return;
  btnReady.style.display=(!isReady&&!isMaster)?'inline-block':'none';
  btnStart.style.display=isMaster?'inline-block':'none';
  const players=myRoom.players||[];
  const allReady=players.length===2&&players.every(p=>p.ready||p.master);
  btnStart.disabled=!allReady;
  if(isReady){ btnReady.textContent='✓ Ready'; btnReady.style.background='#1a3a1a'; btnReady.style.color='#4CFF6C'; }
}

function addMsg(player,content){ const box=document.getElementById('chat-msgs'); const d=document.createElement('div'); d.className='chat-line'; d.innerHTML=`<span class="chat-author">${player}:</span> ${content}`; box.appendChild(d); box.scrollTop=box.scrollHeight; }
function sysMsg(text){ const box=document.getElementById('chat-msgs'); const d=document.createElement('div'); d.className='chat-line'; d.innerHTML=`<span class="chat-sys">· ${text}</span>`; box.appendChild(d); box.scrollTop=box.scrollHeight; }

document.getElementById('btn-chat').onclick=sendChat;
document.getElementById('chat-input').addEventListener('keydown',e=>{ if(e.key==='Enter') sendChat(); });
function sendChat(){ const inp=document.getElementById('chat-input'); const content=inp.value.trim(); if(!content||!myRoom) return; socket.emit('room:talk',{content}); inp.value=''; }

document.getElementById('btn-ready').onclick=()=>{ if(!myName){status('Set your name first','err');return;} isReady=true; socket.emit('room:ready'); updateActions(); };
document.getElementById('btn-start').onclick=()=>{ const players=myRoom?.players||[]; const allReady=players.length===2&&players.every(p=>p.ready||p.master); if(!allReady){status('Waiting for opponent to ready up','err');return;} socket.emit('room:ready'); };
document.getElementById('btn-leave').onclick=()=>{ socket.emit('room:leave'); myRoom=null; isMaster=false; isReady=false; document.getElementById('room-placeholder').style.display='flex'; document.getElementById('room-detail').style.display='none'; status('Left room',''); };

document.getElementById('btn-create').onclick=()=>{ if(!myName){status('Set your name first','err');return;} document.getElementById('modal-name').value=myName+"'s Room"; document.getElementById('modal-bg').classList.add('open'); document.getElementById('modal-name').focus(); };
document.getElementById('btn-modal-cancel').onclick=()=>document.getElementById('modal-bg').classList.remove('open');
document.getElementById('btn-modal-confirm').onclick=()=>{ const name=document.getElementById('modal-name').value.trim()||myName+"'s Room"; socket.emit('room:create',{name,open:roomIsPublic,playerName:myName}); document.getElementById('modal-bg').classList.remove('open'); };
document.getElementById('modal-name').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('btn-modal-confirm').click(); });
document.getElementById('toggle-public').onclick=()=>{ roomIsPublic=true; document.getElementById('toggle-public').classList.add('active'); document.getElementById('toggle-private').classList.remove('active'); };
document.getElementById('toggle-private').onclick=()=>{ roomIsPublic=false; document.getElementById('toggle-private').classList.add('active'); document.getElementById('toggle-public').classList.remove('active'); };

document.getElementById('btn-joincode').onclick=joinByCode;
document.getElementById('join-code-input').addEventListener('keydown',e=>{ if(e.key==='Enter') joinByCode(); });
function joinByCode(){ if(!myName){status('Set your name first','err');return;} const code=document.getElementById('join-code-input').value.trim(); if(code.length!==4){status('Enter a 4-digit code','err');return;} socket.emit('room:join',{code,playerName:myName}); }

const params=new URLSearchParams(window.location.search);
if(params.get('name')){ myName=params.get('name'); document.getElementById('name-input').value=myName; localStorage.setItem('pong_name',myName); }
</script>
</body>
</html>
